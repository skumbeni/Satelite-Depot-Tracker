<script>
/* =========================================================================
   SATELLITE DEPOT STOCK MANAGEMENT SYSTEM
   Single-file HTML + Firebase (Realtime Database) build
   Converted from a Next.js/Prisma reference project.

   Tailwind CSS, Chart.js, and the Firebase SDK are bundled directly inside
   this file (no CDN <script> tags) so it works even on restrictive/blocked
   networks. The only network access this file needs at runtime is to
   Firebase's own servers (Realtime Database/Auth), which is unavoidable for any
   cloud-synced app.

   ---------------------------------------------------------------------
   SETUP INSTRUCTIONS
   ---------------------------------------------------------------------
   1. Create a Firebase project at https://console.firebase.google.com
   2. Enable "Realtime Database" (start in locked mode is fine).
   3. Enable "Authentication" -> Sign-in method -> Anonymous (this is used
      only to satisfy the RTDB rule requiring auth != null - actual login
      is username/password checked against the `users` node below,
      matching the original app's login screen).
   4. Copy your web app config into FIREBASE_CONFIG below (databaseURL is
      required for Realtime Database - find it on the RTDB "Data" tab).
   5. Paste the RTDB SECURITY RULES (bottom of this comment block) into
      Realtime Database -> Rules.
   6. Open this file in a browser (or host it on GitHub Pages). Click
      "Seed Demo Data" on the login screen to create the demo depot, users,
      stock items and personnel (same as the original seed route) - or use
      "Create one" to sign up as your own Manager with your own private
      depot network. See AUTH MODEL below.

   Demo credentials after seeding:
     Manager  : manager / manager123   (has access to the demo depot)
     SDC Clerk: sdc1 / sdc123          (scoped to the demo depot)
     SDC Clerk: sdc2 / sdc123          (scoped to the demo depot)
   (The demo seed creates these SDC accounts directly; outside of seeding,
   new SDC accounts are created by the Manager from the "SDC Accounts" page.)

   ---------------------------------------------------------------------
   MULTI-DEPOT MODEL / MULTI-TENANCY
   ---------------------------------------------------------------------
   This build supports many independent Managers sharing one Firebase
   project, each with their own private depot network - one Manager's
   depots, SDC accounts, stock, and personnel are never shown to another
   Manager. A Manager can also oversee MULTIPLE satellite depots within
   their own network, with data fully separated per depot:

   - Every Manager who signs up becomes the sole Manager of a brand-new
     tenant, keyed by their own username (the `ownerUsername` field).
     There's no single "first account" anymore - anyone can sign up and
     gets their own depot network.
   - "depots" node: { id, name, location, ownerUsername, createdAt } - one
     entry per physical depot, tagged with the username of the Manager who
     owns it. Every other collection (stockItems, stockTransactions,
     maizePurchases, maizeDispatches, personnel, laborPayments) carries a
     depotId field and is filtered to the currently-selected depot on the
     client; since a depotId only ever belongs to one Manager's tenant,
     this keeps those collections tenant-scoped too without needing their
     own ownerUsername field.
   - MANAGER accounts store `depotIds`: an array of every depot they
     manage. A Manager names their first depot right on the signup form; a
     "Depots" page (visible only to MANAGER) lets them create/rename
     additional depots afterwards, all tagged with their own
     ownerUsername. The client loads a Manager's depot list by querying
     `depots` for `ownerUsername == <their username>`, not by fetching the
     whole collection.
   - SDC Clerk accounts store a single `depotId` - exactly one depot,
     matching the "2 SDCs + 2 Guards per depot" staffing model - plus an
     `ownerUsername` recording which Manager's tenant they belong to. SDC
     accounts are created by the Manager from the "SDC Accounts" page,
     always scoped to whichever depot is currently selected - there is no
     public SDC signup form.

/* ------------------------- Realtime Database shim -------------------------
   Firestore has been swapped out for the Realtime Database REST API (no
   SDK), matching the architecture used across the rest of the Nexlite
   product suite. This shim exposes the same chainable
   collection/where/limit/orderBy/get/doc/add/set/update/onSnapshot/batch
   surface the rest of this file already calls, so nothing below this
   block needed to change.
   ========================================================================= */
const FieldValue = { serverTimestamp: () => ({ '.sv': 'timestamp' }) };

function rtdbPushId(){
  const chars = '-0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefghijklmnopqrstuvwxyz';
  let id = '';
  for (let i = 0; i < 20; i++) id += chars.charAt(Math.floor(Math.random()*chars.length));
  return Date.now().toString(36) + id;
}

function rtdbCompare(a, b){
  if (a === b) return 0;
  if (a === undefined || a === null) return -1;
  if (b === undefined || b === null) return 1;
  return a < b ? -1 : 1;
}

class RTDBClient {
  constructor(config, getAuthToken){
    this.baseUrl = (config.databaseURL || '').replace(/\/$/, '');
    this.getAuthToken = getAuthToken;
  }
  async _fetchOnce(path, method, body, timeoutMs, query){
    // Both the auth-token fetch and the RTDB request itself are plain
    // network calls with no built-in timeout - on a flaky mobile connection
    // they can hang indefinitely, leaving buttons stuck on "Creating..."/
    // "Checking availability..." forever with no error ever surfacing.
    // Wrap the whole thing in one watchdog timer so a stalled request always
    // fails fast with a clear, catchable error instead of hanging the UI.
    const controller = new AbortController();
    const timer = setTimeout(()=> controller.abort(), timeoutMs);
    try {
      const token = await Promise.race([
        this.getAuthToken(),
        new Promise((_, rej)=> setTimeout(()=> rej(new Error('Timed out getting auth token - check your connection.')), timeoutMs))
      ]);
      const params = { ...(query || {}) };
      if (token) params.auth = token;
      const qs = Object.keys(params).length ? '?' + Object.entries(params).map(([k,v])=>`${k}=${v}`).join('&') : '';
      const url = `${this.baseUrl}/${path}.json${qs}`;
      const opts = { method, signal: controller.signal };
      if (body !== undefined) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      if (!res.ok) {
        const text = await res.text().catch(()=> '');
        const err = new Error(`Realtime Database ${method} ${path} failed (${res.status}): ${text}`);
        // 4xx means the server understood the request and rejected it (bad
        // data, no permission, etc) - retrying identical bytes will never
        // help. 5xx/network-level failures are the server or the connection
        // having a bad moment, so those are worth retrying.
        err.retryable = res.status >= 500;
        throw err;
      }
      return res.status === 204 ? null : res.json();
    } catch (e) {
      if (e.name === 'AbortError') { const err = new Error('Request timed out - check your internet connection and try again.'); err.retryable = true; throw err; }
      if (e.retryable === undefined) e.retryable = true; // TypeError "Failed to fetch" etc - a dropped connection, not a real rejection
      throw e;
    } finally {
      clearTimeout(timer);
    }
  }
  async _fetch(path, method='GET', body, timeoutMs=6000, query=null, retries=1){
    // A single weak-signal blip used to surface immediately as a user-facing
    // error (a toast, a stuck button) even though the same request would
    // have gone through fine two seconds later. Retry a transient failure
    // once with a short backoff before giving up.
    //
    // Kept deliberately tight (6s timeout, 1 retry -> ~13s worst case)
    // because every one-shot get/set/query in this app runs synchronously
    // in front of a UI action (a button that says "Creating...", a status
    // line that says "Checking..."). The old defaults (12s timeout, 3
    // retries, backoff up to 6s) meant a single foreground action could
    // legitimately take ~40s to fail on a weak connection, which reads as
    // "hung" to the person tapping the button long before the error ever
    // surfaces. Live listeners (onSnapshot/_sse) are unaffected - those
    // reconnect on their own schedule and don't go through this method.
    let attempt = 0;
    for (;;) {
      try {
        return await this._fetchOnce(path, method, body, timeoutMs, query);
      } catch (e) {
        if (!e.retryable || attempt >= retries) throw e;
        attempt++;
        const backoff = Math.min(800 * 2 ** (attempt - 1), 1500) + Math.random() * 300;
        await new Promise(r => setTimeout(r, backoff));
      }
    }
  }
  async _sse(path, onEvent, query=null, onOpen=null){
    const token = await this.getAuthToken();
    const params = { ...(query || {}) };
    if (token) params.auth = token;
    const qs = Object.keys(params).length ? '?' + Object.entries(params).map(([k,v])=>`${k}=${v}`).join('&') : '';
    const url = `${this.baseUrl}/${path}.json${qs}`;
    const es = new EventSource(url);
    es.addEventListener('put', onEvent);
    es.addEventListener('patch', onEvent);
    if (onOpen) es.addEventListener('open', onOpen, { once: true });
    es.onerror = ()=>{}; // EventSource auto-reconnects; surfaced errors are noisy and non-fatal
    return () => es.close();
  }
  collection(name){ return new RTDBCollection(this, name); }
  batch(){ return new RTDBBatch(this); }
}

// Encodes a JS value the way Firebase RTDB's REST `equalTo`/`startAt` query
// params expect: quoted strings, bare numbers/booleans, literal null.
function rtdbRestValue(v){
  if (v === null || v === undefined) return 'null';
  if (typeof v === 'number' || typeof v === 'boolean') return String(v);
  return JSON.stringify(String(v));
}

class RTDBQuery {
  constructor(client, path){
    this.client = client;
    this.path = path;
    this._wheres = [];
    this._orderField = null;
    this._desc = false;
    this._limit = null;
  }
  where(field, op, value){ this._wheres.push({field, op, value}); return this; }
  orderBy(field, dir){ this._orderField = field; this._desc = (dir === 'desc'); return this; }
  limit(n){ this._limit = n; return this; }
  // Every `.where()` call in this app is a single equality filter (almost
  // always `depotId == X`). Previously that filter was applied entirely
  // client-side: the ENTIRE top-level node (every depot, every manager's
  // data, across the whole multi-tenant database) was downloaded on every
  // fetch and every realtime reconnect, then filtered down in the browser.
  // On a slow/weak mobile connection that payload alone was routinely
  // blowing past the request timeout - not a connection-count problem, a
  // "downloading far more data than needed" problem. When the filter is a
  // single `==`, push it down to RTDB's own `orderBy`/`equalTo` REST
  // params so the server only ever sends back the matching rows.
  _restQuery(){
    if (this._wheres.length !== 1) return null;
    const w = this._wheres[0];
    if (w.op !== '==') return null;
    return { orderBy: JSON.stringify(w.field), equalTo: rtdbRestValue(w.value) };
  }
  async get(){
    const raw = await this.client._fetch(this.path, 'GET', undefined, undefined, this._restQuery()) || {};
    let docs = Object.keys(raw).map(id => ({ id, data: raw[id] || {} }));
    // Kept as a safety net (e.g. multiple where() clauses, or if the server
    // didn't have the index and silently returned the unfiltered node) -
    // a no-op re-filter when the server already did the work.
    for (const w of this._wheres) {
      docs = docs.filter(d => w.op === '==' ? d.data[w.field] === w.value : true);
    }
    if (this._orderField) {
      docs.sort((a,b)=> rtdbCompare(a.data[this._orderField], b.data[this._orderField]) * (this._desc ? -1 : 1));
    }
    if (this._limit) docs = docs.slice(0, this._limit);
    return {
      empty: docs.length === 0,
      size: docs.length,
      docs: docs.map(d => ({ id: d.id, data: () => d.data })),
    };
  }
  onSnapshot(onNext, onError, onOpen){
    // Each subscription used to open TWO connections at once: an immediate
    // GET fetch for the initial snapshot, plus a long-lived SSE stream for
    // live updates. With several collections syncing at once (each SSE
    // stream never closes), that can exceed the browser's per-host
    // connection cap - especially on mobile/WebView network stacks still
    // limited to ~6 connections per host - leaving later collections'
    // initial fetch queued behind already-open SSE streams until it times
    // out. Firebase's RTDB SSE stream already delivers the full current
    // value as its first event on connect, so we lean on that for the
    // initial snapshot instead of firing a redundant parallel fetch. We
    // only fall back to a one-off REST fetch if the SSE stream hasn't
    // delivered anything after a grace period (e.g. it failed silently).
    let stopped = false, unsubSSE = null, gotFirst = false;
    const applySnapshot = async () => {
      if (stopped) return;
      try { onNext(await this.get()); gotFirst = true; } catch (e) { if (onError) onError(e); }
    };
    this.client._sse(this.path, applySnapshot, this._restQuery(), onOpen).then(unsub => { stopped ? unsub() : (unsubSSE = unsub); });
    const fallbackTimer = setTimeout(() => {
      if (!stopped && !gotFirst) applySnapshot();
    }, 8000);
    return () => { stopped = true; clearTimeout(fallbackTimer); if (unsubSSE) unsubSSE(); };
  }
}

class RTDBDoc {
  constructor(client, path, id){ this.client = client; this.path = path; this.id = id; }
  set(data){ return this.client._fetch(this.path, 'PUT', data); }
  update(data){ return this.client._fetch(this.path, 'PATCH', data); }
  delete(){ return this.client._fetch(this.path, 'DELETE'); }
}

class RTDBCollection extends RTDBQuery {
  constructor(client, name){ super(client, name); this.name = name; }
  doc(id){ id = id || rtdbPushId(); return new RTDBDoc(this.client, `${this.name}/${id}`, id); }
  async add(data){
    const result = await this.client._fetch(this.name, 'POST', data);
    return { id: result.name };
  }
}

class RTDBBatch {
  constructor(client){ this.client = client; this.updates = {}; }
  set(ref, data){ this.updates[ref.path] = data; return this; }
  commit(){ return this.client._fetch('', 'PATCH', this.updates); }
}

function fmtNum(n){ return Number(n||0).toLocaleString(); }

function esc(s){ return (s===null||s===undefined)?'':String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toast(msg, type='success'){
  const wrap = document.getElementById('toast-wrap');
  // Dedupe: if this exact message is already showing, just restart its timer
  // instead of stacking a second identical toast on top of it.
  const dupe = Array.from(wrap.children).find(el => el.dataset.msg === msg);
  if (dupe) { clearTimeout(dupe._dismissTimer); dupe._dismissTimer = scheduleToastDismiss(dupe, type); return; }
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.dataset.msg = msg;
  const text = document.createElement('span');
  text.className = 'toast-text';
  text.textContent = msg;
  el.appendChild(text);
  const closeBtn = document.createElement('button');
  closeBtn.className = 'toast-close';
  closeBtn.type = 'button';
  closeBtn.setAttribute('aria-label','Dismiss');
  closeBtn.textContent = '\u00d7';
  closeBtn.onclick = () => dismissToastEl(el);
  el.appendChild(closeBtn);
  wrap.appendChild(el);
  // Never let more than 4 toasts pile up and cover the screen - drop the
  // oldest ones first if a burst of errors comes in at once.
  while (wrap.children.length > 4) dismissToastEl(wrap.firstChild);
  el._dismissTimer = scheduleToastDismiss(el, type);
}
function scheduleToastDismiss(el, type){
  // Error toasts stay up noticeably longer - they were disappearing before
  // anyone on a small mobile screen could actually finish reading them.
  return setTimeout(()=> dismissToastEl(el), type === 'error' ? 7000 : 3200);
}
function dismissToastEl(el){
  if (!el || !el.parentNode) return;
  clearTimeout(el._dismissTimer);
  el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300);
}

// Multiple realtime listeners can all fail at once on a flaky connection
// (one per collection). Rather than firing a separate toast per collection -
// which stacks up and covers the whole screen - batch failures that land
// within a short window into a single, combined toast.
let __syncErrorBuffer = [];
let __syncErrorTimer = null;
function reportSyncError(label, err){
  console.error(`Sync error on ${label}:`, err);
  __syncErrorBuffer.push(label);
  clearTimeout(__syncErrorTimer);
  __syncErrorTimer = setTimeout(()=>{
    const labels = [...new Set(__syncErrorBuffer)];
    __syncErrorBuffer = [];
    const msg = labels.length > 1
      ? `Live sync issue on ${labels.length} feeds (${labels.join(', ')}) - check your internet connection.`
      : `Live sync error (${labels[0]}) - check your internet connection.`;
    toast(msg, 'error');
  }, 400);
}

/* ------------------------------ Offline Cache ------------------------------
   Every collection's live data now also gets mirrored into localStorage as
   it arrives. If a screen loads (or a listener drops and can't reconnect)
   while offline, we hydrate straight from this last-known-good snapshot
   instead of leaving the UI blank/zeroed until the network comes back. */
function cacheKey(name, scopeId){ return `depot-cache:${name}:${scopeId || '_'}`; }
function cacheSave(name, scopeId, data){
  try { localStorage.setItem(cacheKey(name, scopeId), JSON.stringify({ data, savedAt: Date.now() })); }
  catch(e){ /* storage full/unavailable (e.g. private browsing) - caching is a nice-to-have, never fatal */ }
}
function cacheLoad(name, scopeId){
  try {
    const raw = localStorage.getItem(cacheKey(name, scopeId));
    return raw ? JSON.parse(raw) : null;
  } catch(e){ return null; }
}

function friendlyAuthError(err){
  const code = err && err.code;
  const msg = (err && err.message) || 'Login failed';
  if (code === 'auth/operation-not-allowed' || code === 'auth/admin-restricted-operation') {
    return 'Anonymous sign-in is not enabled for this Firebase project. Go to Firebase Console -> Authentication -> Sign-in method -> enable "Anonymous".';
  }
  if (code === 'auth/invalid-api-key' || code === 'auth/api-key-not-valid') {
    return 'Your Firebase config (FIREBASE_CONFIG) has an invalid API key. Double-check you pasted your real project config.';
  }
  if (msg.toLowerCase().includes('permission') || msg.toLowerCase().includes('insufficient')) {
    return 'Realtime Database denied the request (permission-denied). Check that your Realtime Database security rules allow reads/writes when auth != null, and that Anonymous sign-in is enabled.';
  }
  if (msg.toLowerCase().includes('project') && msg.toLowerCase().includes('not')) {
    return 'Could not reach your Firebase project. Double-check the projectId in FIREBASE_CONFIG.';
  }
  return msg;
}

/* ----------------------------- Auth / Login ----------------------------- */
async function ensureAnonAuth(){
  if (!auth.currentUser) {
    await auth.signInAnonymously();
  }
}

async function fetchDepotsById(ids){
  if (!ids || !ids.length) return [];
  const all = await db.collection('depots').get();
  return all.docs.map(d=>({id:d.id, ...d.data()})).filter(d=>ids.includes(d.id));
}

async function login(username, password){
  await ensureAnonAuth();
  const snap = await db.collection('users').where('username','==',username).limit(1).get();
  if (snap.empty) throw new Error('Invalid username or password');
  const doc = snap.docs[0];
  const u = doc.data();
  if (u.deleted) throw new Error('Invalid username or password'); // deactivated account - same generic error, doesn't leak account existence
  if (u.password !== password) throw new Error('Invalid username or password');
  const user = { id: doc.id, username: u.username, name: u.name, role: u.role, phone: u.phone || null, depotId: u.depotId || null, depotIds: u.depotIds || null };
  state.user = user;
  localStorage.setItem('depot-auth', JSON.stringify(user));
  await loadDepotsForUser();
  return user;
}

async function loadDepotsForUser(){
  // Populates state.depots with every depot the signed-in account can see,
  // and picks (or keeps) which one is currently active.
  // Cache key scopes by account (Manager username, or SDC's own user id) so
  // different accounts on the same device never see each other's list.
  const cacheScope = state.user.role === 'MANAGER' ? `mgr:${state.user.username}` : `sdc:${state.user.id}`;
  try {
    if (state.user.role === 'MANAGER') {
      // Each Manager is their own tenant - only ever see depots you own,
      // queried directly by your username rather than filtering the whole
      // depots collection.
      const snap = await db.collection('depots').where('ownerUsername','==',state.user.username).get();
      state.depots = snap.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>rtdbCompare(a.name,b.name));
    } else {
      const allDepots = (await db.collection('depots').get()).docs.map(d=>({id:d.id, ...d.data()}));
      state.depots = allDepots.filter(d=>d.id === state.user.depotId);
    }
    cacheSave('depots', cacheScope, state.depots);
    state.usingCachedData = false;
  } catch(e){
    // Offline (or the request otherwise failed): fall back to the last
    // known depot list instead of throwing, which previously bubbled up to
    // init() and logged the person out entirely just because the network
    // blipped on startup.
    const cached = cacheLoad('depots', cacheScope);
    if (!cached) throw e; // genuinely nothing to show (e.g. first-ever login offline) - let the caller handle it
    state.depots = cached.data;
    state.usingCachedData = true;
    reportSyncError('depots (offline)', e);
  }
  if (state.user.role === 'MANAGER') {
    const ids = state.depots.map(d=>d.id);
    const saved = localStorage.getItem('depot-current-id');
    state.currentDepotId = (saved && ids.includes(saved)) ? saved : (state.depots[0] ? state.depots[0].id : null);
  } else {
    state.currentDepotId = state.user.depotId || null;
  }
  if (state.currentDepotId) localStorage.setItem('depot-current-id', state.currentDepotId);
}

async function switchDepot(depotId){
  if (depotId === state.currentDepotId) return;
  state.currentDepotId = depotId;
  localStorage.setItem('depot-current-id', depotId);
  stopRealtimeSync();
  await startRealtimeSync();
  render();
}

async function signup(username, password, name, phone, depotChoice){
  await ensureAnonAuth();

  if (!username || !password || !name) throw new Error('Please fill in all required fields.');
  if (password.length < 6) throw new Error('Password must be at least 6 characters.');

  const available = await checkUsernameAvailable(username);
  if (!available) throw new Error('That username is already taken. Please choose another.');

  // Every signup creates a brand-new Manager account with its own private
  // tenant - depots, SDC accounts, stock, everything - separated from every
  // other Manager's data by username. There is no shared "first account"
  // anymore: anyone can sign up and becomes the sole Manager of their own
  // depot network. SDC accounts are still never self-signed-up; the Manager
  // creates those from the "SDC Accounts" page, scoped to their own tenant.
  const role = 'MANAGER';
  const newUserRef = db.collection('users').doc();

  const depotName = (depotChoice && depotChoice.newDepotName) || 'Main Depot';
  const depotRef = db.collection('depots').doc();
  await depotRef.set({ name: depotName, location: null, ownerUsername: username, createdAt: FieldValue.serverTimestamp() });
  const userData = { username, password, name, role, phone: phone || null, depotIds: [depotRef.id] };
  const user = { id: newUserRef.id, username, name, role, phone: phone || null, depotId: null, depotIds: [depotRef.id] };

  await newUserRef.set(userData);
  state.user = user;
  localStorage.setItem('depot-auth', JSON.stringify(user));
  await loadDepotsForUser();
  return user;
}

/* --------------------------- SDC Account Management ---------------------------
   Manager-only: SDC login accounts are no longer self-signed-up. The Manager
   creates them here, from the "SDC Accounts" page, always scoped to whichever
   depot is currently selected - which is itself always one of that Manager's
   own tenant's depots.
   ================================================================================ */
// Shared by Manager signup and SDC account creation. Once a username has
// ever been used, it stays reserved forever - even after the account is
// later removed - because removal is a soft-delete (see deleteSdcAccount)
// that keeps the `users` doc (and its username) in place. This avoids the
// audit-trail ambiguity of a brand-new person inheriting an old username.
async function checkUsernameAvailable(username){
  if (!username) return null;
  const snap = await db.collection('users').where('username','==',username).limit(1).get();
  const available = snap.empty;
  __lastUsernameCheck = { username, available, ts: Date.now() };
  return available;
}

// Populated by checkUsernameAvailable (including the live typing indicator).
// createSdcAccount reads this to skip a second network round-trip for the
// exact same username on submit - on a slow connection that second check
// was doubling the wait for no benefit, since nothing changes username
// availability in the few seconds between "stopped typing" and "tapped
// Create". Anything older than 8s, or for a different username, is
// ignored and re-checked for real - this is just for the common case of
// submitting right after the live indicator already confirmed it.
let __lastUsernameCheck = null;
async function checkUsernameAvailableCached(username){
  if (__lastUsernameCheck && __lastUsernameCheck.username === username && (Date.now() - __lastUsernameCheck.ts) < 8000) {
    return __lastUsernameCheck.available;
  }
  return checkUsernameAvailable(username);
}

// Wires a live "is this username available?" indicator onto any username
// input + status element pair. Debounced so it doesn't hit Firestore on
// every keystroke, and token-guarded so a slow earlier check can't overwrite
// the result of a later one.
function attachUsernameAvailabilityCheck(inputId, statusId){
  const input = document.getElementById(inputId);
  const status = document.getElementById(statusId);
  if (!input || !status) return;
  let debounceTimer = null;
  let requestToken = 0;
  input.addEventListener('input', ()=>{
    const value = input.value.trim();
    clearTimeout(debounceTimer);
    requestToken++;
    if (!value){ status.textContent = ''; return; }
    if (value.length < 3){ status.textContent = 'Username must be at least 3 characters'; status.className = 'text-xs mt-1 text-gray-400'; return; }
    status.textContent = 'Checking availability...';
    status.className = 'text-xs mt-1 text-gray-400';
    const myToken = requestToken;
    debounceTimer = setTimeout(async ()=>{
      try{
        const available = await checkUsernameAvailable(value);
        if (myToken !== requestToken) return; // a newer keystroke has since superseded this check
        if (available){
          status.textContent = '\u2713 Username is available';
          status.className = 'text-xs mt-1 text-emerald-600';
        } else {
          status.textContent = '\u2717 Username is already taken';
          status.className = 'text-xs mt-1 text-red-600';
        }
      } catch(err){
        if (myToken !== requestToken) return;
        // Don't just go blank on failure - that reads as "still checking"
        // forever with no indication anything went wrong. This is non-
        // blocking (the form can still be submitted; checkUsernameAvailable
        // runs again server-side at that point), just informational.
        status.textContent = 'Could not check availability - check your connection';
        status.className = 'text-xs mt-1 text-gray-400';
      }
    }, 450);
  });
}

async function createSdcAccount(username, password, name, phone, depotId){
  if (!username || !password || !name) throw new Error('Please fill in all required fields.');
  if (password.length < 6) throw new Error('Password must be at least 6 characters.');
  if (!depotId) throw new Error('Select a depot first.');

  const available = await checkUsernameAvailableCached(username);
  if (!available) throw new Error('That username is already taken. Please choose another.');

  const newUserRef = db.collection('users').doc();
  await newUserRef.set({ username, password, name, role: 'SDC', phone: phone || null, depotId, ownerUsername: state.user.username });
  // state.sdcAccounts updates itself via the live listener in
  // startRealtimeSync - no manual reload needed, same as every other
  // collection's create/update/delete path in this file.
  return newUserRef.id;
}

// Moves an SDC login between depots, or unlinks it entirely. depotId is
// the target depot's id, or null/'' to leave the account unassigned (it
// will disappear from every depot's list until relinked). Guard/SDC
// `personnel` records have always supported this - depotId there is just a
// plain field with no immutability rule around it - this brings SDC login
// accounts to parity with that.
async function reassignSdcDepot(userId, depotId){
  await db.collection('users').doc(userId).update({ depotId: depotId || null });
}

async function deleteSdcAccount(userId){
  // Soft-delete: the doc (and its username) stays in Firestore forever so
  // the username can never be reissued to a different person, and so old
  // records that reference this account's id keep meaning what they meant.
  // The account just becomes unable to log in and disappears from the list.
  await db.collection('users').doc(userId).update({ deleted: true, deletedAt: FieldValue.serverTimestamp() });
}

async function createDepot(name, location){
  if (!name || !name.trim()) throw new Error('Depot name is required.');
  const depotRef = db.collection('depots').doc();
  await depotRef.set({ name: name.trim(), location: location ? location.trim() : null, ownerUsername: state.user.username, createdAt: FieldValue.serverTimestamp() });
  const newDepotIds = [...(state.user.depotIds || []), depotRef.id];
  await db.collection('users').doc(state.user.id).update({ depotIds: newDepotIds });
  state.user.depotIds = newDepotIds;
  localStorage.setItem('depot-auth', JSON.stringify(state.user));
  await loadDepotsForUser();
  state.allDepotsSummary = null; // stale now that a new depot exists - reload on next view
  return depotRef.id;
}

async function renameDepot(depotId, name, location){
  if (!name || !name.trim()) throw new Error('Depot name is required.');
  await db.collection('depots').doc(depotId).update({ name: name.trim(), location: location ? location.trim() : null });
  await loadDepotsForUser();
}

function logout(){
  stopRealtimeSync();
  state.user = null;
  state.depots = [];
  state.currentDepotId = null;
  state.allDepotsSummary = null;
  state.dashboardScope = 'current';
  localStorage.removeItem('depot-auth');
  localStorage.removeItem('depot-current-id');
  render();
}

/* ------------------------------ Data Fetch ------------------------------ */
/* ------------------------- Real-time Data Syncing -------------------------
   Every logged-in account (manager, sdc1, sdc2, etc.) shares the same
   Realtime Database collections. Instead of fetching once per page view, we
   attach a live `onSnapshot` listener (backed by an SSE stream against the
   RTDB REST API) to each collection. Any change - from this device or any
   other signed-in device - reaches every listener within moments, so all
   accounts stay in sync automatically without needing to manually refresh.
   ========================================================================= */
const SYNC_COLLECTIONS = [
  { name: 'stockItems',        stateKey: 'stockItems',        orderField: 'name' },
  { name: 'stockTransactions', stateKey: 'stockTransactions', orderField: 'date', desc: true },
  { name: 'maizePurchases',    stateKey: 'maizePurchases',    orderField: 'date', desc: true },
  { name: 'maizeDispatches',   stateKey: 'maizeDispatches',   orderField: 'date', desc: true },
  { name: 'personnel',         stateKey: 'personnel',         orderField: 'name' },
  { name: 'laborPayments',     stateKey: 'laborPayments',     orderField: 'date', desc: true },
];

function startRealtimeSync(){
  if (state.listeners.length) return Promise.resolve(); // already syncing
  if (!state.currentDepotId) {
    // No depot selected yet (e.g. a brand-new Manager with zero depots) -
    // nothing to sync until one exists.
    SYNC_COLLECTIONS.forEach(c=>{ state[c.stateKey] = []; });
    state.sdcAccounts = [];
    state.dataReady = true;
    state.loading = false;
    state.usingCachedData = false;
    return Promise.resolve();
  }
  state.loading = true;
  const isManager = state.user && state.user.role === 'MANAGER';

  // Hydrate immediately from whatever was cached last time this depot
  // synced successfully, so the dashboard/lists show real numbers right
  // away instead of sitting blank while the first live fetch is in flight -
  // this is what actually gets replaced by fresh data a moment later, or
  // stays put (marked as offline) if that fetch never lands.
  let hydratedFromCache = false;
  SYNC_COLLECTIONS.forEach(c=>{
    const cached = cacheLoad(c.name, state.currentDepotId);
    if (cached){ state[c.stateKey] = cached.data; hydratedFromCache = true; }
  });
  if (isManager) {
    const cachedSdc = cacheLoad('sdcAccounts', state.user.username);
    if (cachedSdc){ state.sdcAccounts = cachedSdc.data; hydratedFromCache = true; }
  }
  state.usingCachedData = hydratedFromCache;

  let pending = SYNC_COLLECTIONS.length + (isManager ? 1 : 0);
  return new Promise(resolve=>{
    const markReceived = () => {
      if (pending > 0){
        pending--;
        if (pending === 0){ state.dataReady = true; state.loading = false; resolve(); }
      }
    };
    // Each collection's onSnapshot opens a long-lived SSE connection that
    // never closes. Starting all of them within the same short window (the
    // previous fix just used a fixed 150ms delay per collection) still lets
    // several connection ATTEMPTS overlap - on slow/carrier-proxied 4G, the
    // handshake for one stream can easily take longer than 150ms, so multiple
    // attempts pile up and exceed the browser's per-host connection cap
    // anyway, and every one of them times out together. Instead, start
    // collections one at a time and gate each next start on the previous
    // stream actually opening (or a bounded fallback wait if it's stuck) -
    // this guarantees only one connection is ever mid-handshake at once,
    // regardless of how slow any individual attempt is.
    const startCollection = (c) => new Promise(advance => {
      let advanced = false;
      const next = () => { if (advanced) return; advanced = true; advance(); };
      let q = db.collection(c.name).where('depotId','==',state.currentDepotId);
      q = c.desc ? q.orderBy(c.orderField,'desc') : q.orderBy(c.orderField);
      const unsub = q.onSnapshot(snap=>{
        let docs = snap.docs.map(d=>({id:d.id, ...d.data()}));
        if (c.name === 'stockItems') docs = docs.filter(item=>!item.deleted);
        state[c.stateKey] = docs;
        cacheSave(c.name, state.currentDepotId, state[c.stateKey]);
        state.usingCachedData = false;
        markReceived();
        // Live-refresh whatever the signed-in user is currently looking at,
        // so changes made on another device/account appear without reload.
        if (state.user && state.dataReady) renderPageAfterFetch();
      }, err=>{
        // Leaves state[c.stateKey] exactly as it was (cached data if we
        // hydrated above, or whatever the last live update left it as) -
        // never wipes it to empty just because this one fetch failed.
        reportSyncError(c.name, err);
        markReceived();
        next();
      }, next);
      state.listeners.push(unsub);
      // This is a safety net for a connection that's genuinely stuck (bad
      // auth, dead proxy, etc), NOT a substitute for waiting on slow ones.
      // On the exact conditions this fix targets - poor 4G - a stream can
      // legitimately take several seconds to open, and advancing early
      // just recreates the pile-up we're trying to avoid (the previous,
      // still-connecting attempt is never cancelled, so a short fallback
      // here means two+ attempts end up in flight at once anyway). Keep
      // this long enough that it almost never fires under real congestion.
      setTimeout(next, 20000);
    });
    (async ()=>{
      for (const c of SYNC_COLLECTIONS) await startCollection(c);
      // SDC login accounts (Manager-only "SDC Accounts" page) live-sync the
      // same way as every other collection above, rather than the one-off
      // fetch this used to do on every single open/refresh of that page -
      // that manual round-trip was the only thing making the Accounts tab
      // noticeably slower to open than any other tab.
      if (isManager) {
        const q = db.collection('users').where('ownerUsername','==',state.user.username);
        const unsub = q.onSnapshot(snap=>{
          state.sdcAccounts = snap.docs.map(d=>({id:d.id, ...d.data()})).filter(u=>u.role==='SDC' && !u.deleted);
          cacheSave('sdcAccounts', state.user.username, state.sdcAccounts);
          state.usingCachedData = false;
          markReceived();
          if (state.user && state.dataReady) renderPageAfterFetch();
        }, err=>{
          reportSyncError('SDC accounts', err);
          markReceived();
        });
        state.listeners.push(unsub);
      }
    })();
  });
}

function stopRealtimeSync(){
  state.listeners.forEach(unsub=>{ try{ unsub(); } catch(e){} });
  state.listeners = [];
  state.dataReady = false;
}

/* ------------------------------ Computations ----------------------------- */
function computeStockBalances(items=state.stockItems, txs=state.stockTransactions){
  return items.map(item=>{
    let balance=0, totalReceipts=0, totalIssues=0, totalDamages=0;
    txs.filter(tx=>tx.stockItemId===item.id).forEach(tx=>{
      if (tx.type==='RECEIPT'){ balance+=tx.quantity; totalReceipts+=tx.quantity; }
      else if (tx.type==='ISSUE'){ balance-=tx.quantity; totalIssues+=tx.quantity; }
      else if (tx.type==='DAMAGE'){ balance-=tx.quantity; totalDamages+=tx.quantity; }
    });
    return { stockItemId:item.id, stockItemName:item.name, unit:item.unit, balance, totalReceipts, totalIssues, totalDamages };
  });
}

const KG_PER_BAG = 50;
function kgToBags(kg){ return Math.round(((Number(kg)||0) / KG_PER_BAG) * 10) / 10; }
function fmtBags(kg){ return fmtNum(kgToBags(kg)); }
function fmtKgBags(kg){ return `${fmtBags(kg)} bags (${fmtNum(kg)} kg)`; }

function computeMaizeBalance(purchases=state.maizePurchases, dispatches=state.maizeDispatches){
  const totalPurchasedKg = purchases.reduce((s,p)=>s+p.quantityKg,0);
  const totalDispatchedKg = dispatches.reduce((s,d)=>s+d.quantityKg,0);
  const totalPurchaseCost = purchases.reduce((s,p)=>s+p.totalCost,0);
  const balanceKg = totalPurchasedKg-totalDispatchedKg;
  return {
    totalPurchasedKg, totalDispatchedKg, balanceKg, totalPurchaseCost,
    totalPurchasedBags: kgToBags(totalPurchasedKg),
    totalDispatchedBags: kgToBags(totalDispatchedKg),
    balanceBags: kgToBags(balanceKg),
  };
}

function lastPrcnToday(purchases=state.maizePurchases){
  const today = todayStr();
  const todays = purchases.filter(p=>p.date===today && p.prcnNumber);
  if (todays.length===0) return null;
  return todays[0].prcnNumber;
}

function laborPaymentsThisMonth(payments=state.laborPayments){
  const now = new Date();
  return payments.filter(p=>{
    const d = new Date(p.date);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  }).reduce((s,p)=>s+p.amount,0);
}

/* ------------------------- Cross-Depot Summary ------------------------- */
// One-time (non-live) fetch of a single depot's six collections, used to
// build combined/side-by-side totals across every depot a Manager owns.
// Kept separate from the real-time listeners in startRealtimeSync, which
// only ever track the currently-selected depot.
async function fetchDepotSummary(depotId){
  const [itemsSnap, txSnap, purchSnap, dispSnap, persSnap, laborSnap] = await Promise.all([
    db.collection('stockItems').where('depotId','==',depotId).get(),
    db.collection('stockTransactions').where('depotId','==',depotId).get(),
    db.collection('maizePurchases').where('depotId','==',depotId).get(),
    db.collection('maizeDispatches').where('depotId','==',depotId).get(),
    db.collection('personnel').where('depotId','==',depotId).get(),
    db.collection('laborPayments').where('depotId','==',depotId).get(),
  ]);
  const items = itemsSnap.docs.map(d=>({id:d.id, ...d.data()}));
  const txs = txSnap.docs.map(d=>({id:d.id, ...d.data()}));
  const purchases = purchSnap.docs.map(d=>({id:d.id, ...d.data()}));
  const dispatches = dispSnap.docs.map(d=>({id:d.id, ...d.data()}));
  const personnel = persSnap.docs.map(d=>({id:d.id, ...d.data()}));
  const laborPayments = laborSnap.docs.map(d=>({id:d.id, ...d.data()}));

  const stockBalances = computeStockBalances(items, txs);
  const maize = computeMaizeBalance(purchases, dispatches);

  return {
    stockItemsCount: items.length,
    stockItemsWithBalance: stockBalances.filter(s=>s.balance>0).length,
    maizeBalanceKg: maize.balanceKg,
    maizePurchasedKg: maize.totalPurchasedKg,
    maizeDispatchedKg: maize.totalDispatchedKg,
    maizePurchaseCost: maize.totalPurchaseCost,
    activePersonnelCount: personnel.filter(p=>p.isActive).length,
    laborThisMonth: laborPaymentsThisMonth(laborPayments),
  };
}

async function loadAllDepotsSummary(force=false){
  if (state.allDepotsSummaryLoading) return;
  if (state.allDepotsSummary && !force) return;
  state.allDepotsSummaryLoading = true;
  renderPageAfterFetch();
  try{
    const entries = await Promise.all(state.depots.map(async d=>[d.id, await fetchDepotSummary(d.id)]));
    state.allDepotsSummary = Object.fromEntries(entries);
  } catch(err){
    toast('Failed to load combined totals: '+err.message, 'error');
  } finally {
    state.allDepotsSummaryLoading = false;
    renderPageAfterFetch();
  }
}

  const showSignup = document.getElementById('show-signup');

    // Every signup creates a brand-new Manager account with its own private
    // tenant, so there's nothing to check first - just open the form.
    state.authView = 'signup';

    case 'reports': body = renderReports(); break;
    case 'settings': body = renderSettings(); break;
    default: return;
  }
  el.innerHTML = offlineBannerHtml() + body;
  switch(page){
    case 'dashboard': attachDashboardEvents(); break;
    case 'stock-ops': attachStockOpsEvents(); break;
    case 'maize-purchases': attachMaizePurchasesEvents(); break;
    case 'personnel': attachPersonnelEvents(); break;
    case 'accounts': attachAccountsEvents(); break;
    case 'labor-payments': attachLaborPaymentsEvents(); break;
    case 'depots': attachDepotsEvents(); break;
    case 'reports': attachReportsEvents(); break;
    case 'settings': attachSettingsEvents(); break;
  }
}

function attachDepotsEvents(){
  attachAllDepotsSummaryEvents();
  const newBtn = document.getElementById('new-depot-btn');
  if (newBtn) newBtn.addEventListener('click', ()=>{
    document.getElementById('modal-root').innerHTML = depotModal(null);
    bindModalClose();
    document.getElementById('depot-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const name = document.getElementById('d-name').value.trim();
      const location = document.getElementById('d-location').value.trim();
      if (!name){ toast('Depot name is required','error'); return; }
      const btn = document.getElementById('modal-submit'); btn.disabled=true; btn.textContent='Saving...';
      try{
        const newId = await createDepot(name, location);
        toast(`${name} created`);
        closeModal();
        await switchDepot(newId);
      } catch(err){ toast('Failed: '+err.message,'error'); btn.disabled=false; btn.textContent='Create Depot'; }
    });
  });
  document.querySelectorAll('[data-switch]').forEach(el=>{
    el.addEventListener('click', ()=>switchDepot(el.dataset.switch));
  });
  document.querySelectorAll('[data-edit]').forEach(el=>{
    el.addEventListener('click', ()=>{
      document.getElementById('modal-root').innerHTML = depotModal({ id: el.dataset.edit, name: el.dataset.name, location: el.dataset.location });
      bindModalClose();
      document.getElementById('depot-form').addEventListener('submit', async (e)=>{
        e.preventDefault();
        const name = document.getElementById('d-name').value.trim();
        const location = document.getElementById('d-location').value.trim();
        if (!name){ toast('Depot name is required','error'); return; }
        const btn = document.getElementById('modal-submit'); btn.disabled=true; btn.textContent='Saving...';
        try{
          await renameDepot(el.dataset.edit, name, location);
          toast('Depot updated');
          closeModal();
          renderPageAfterFetch();
        } catch(err){ toast('Failed: '+err.message,'error'); btn.disabled=false; btn.textContent='Save Changes'; }
      });
    });
  });
}

function attachDashboardEvents(){
  document.querySelectorAll('[data-scope]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const scope = el.dataset.scope;
      if (scope === state.dashboardScope) return;
      state.dashboardScope = scope;
      if (scope === 'all') loadAllDepotsSummary(false); // no-op if already cached
      renderPageAfterFetch();
    });
  });
  attachAllDepotsSummaryEvents();

  if (state.dashboardScope === 'all' && state.user.role === 'MANAGER' && state.depots.length > 1) return;

  const stockBalances = computeStockBalances();
  if (state.charts.balances) state.charts.balances.destroy();
  if (state.charts.movement) state.charts.movement.destroy();

  const ctx1 = document.getElementById('chart-balances');
  if (ctx1){
    state.charts.balances = new Chart(ctx1, {
      type: 'bar',
      data: {
        labels: stockBalances.map(s=>s.stockItemName),
        datasets: [{ label:'Balance', data: stockBalances.map(s=>s.balance), backgroundColor:'#16a34a', borderRadius:4 }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ ticks:{ font:{size:11} } }, y:{ beginAtZero:true } } }
    });
  }

  const totalReceipts = stockBalances.reduce((s,b)=>s+b.totalReceipts,0);
  const totalIssues = stockBalances.reduce((s,b)=>s+b.totalIssues,0);
  const totalDamages = stockBalances.reduce((s,b)=>s+b.totalDamages,0);
  const ctx2 = document.getElementById('chart-movement');
  if (ctx2){
    const labels=[], data=[], colors=[];
    if (totalReceipts>0){ labels.push('Receipts'); data.push(totalReceipts); colors.push('#16a34a'); }
    if (totalIssues>0){ labels.push('Issues'); data.push(totalIssues); colors.push('#dc2626'); }
    if (totalDamages>0){ labels.push('Damages'); data.push(totalDamages); colors.push('#f59e0b'); }
    state.charts.movement = new Chart(ctx2, {
      type: 'doughnut',
      data: { labels, datasets:[{ data, backgroundColor: colors }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}} }
    });
  }
}

function attachStockMovementEvents(){
  document.getElementById('refresh-btn').addEventListener('click', refreshCurrentPage);
  document.getElementById('new-movement-btn').addEventListener('click', ()=>{
    document.getElementById('modal-root').innerHTML = stockMovementModal();
    bindModalClose();
    const itemSelect = document.getElementById('m-item');
    const newItemBox = document.getElementById('m-new-item-box');
    itemSelect.addEventListener('change', ()=>{
      newItemBox.classList.toggle('hidden', itemSelect.value !== '__new__');
    });
    document.getElementById('m-new-item-save').addEventListener('click', async ()=>{
      const name = document.getElementById('m-new-item-name').value.trim();
      const unit = document.getElementById('m-new-item-unit').value.trim();
      if (!name || !unit){ toast('Please enter a name and unit for the new item','error'); return; }
      const saveBtn = document.getElementById('m-new-item-save');
      saveBtn.disabled = true; saveBtn.textContent = 'Saving...';
      try{
        const ref = await db.collection('stockItems').add({
          name, unit, depotId: state.currentDepotId,
          createdById: state.user.id, createdByName: state.user.name,
          createdAt: FieldValue.serverTimestamp(),
        });
        state.stockItems.push({ id: ref.id, name, unit, depotId: state.currentDepotId });
        const opt = document.createElement('option');
        opt.value = ref.id; opt.textContent = `${name} (Bal: 0 ${unit})`;
        itemSelect.insertBefore(opt, itemSelect.querySelector('option[value="__new__"]'));
        itemSelect.value = ref.id;
        newItemBox.classList.add('hidden');
        toast(`Item "${name}" added`);
      } catch(err){ toast('Failed to add item: '+err.message,'error'); }
      saveBtn.disabled = false; saveBtn.textContent = 'Save Item';
    });
    document.getElementById('movement-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const stockItemId = document.getElementById('m-item').value;
      const type = document.getElementById('m-type').value;
      const quantity = Number(document.getElementById('m-qty').value);
      if (!stockItemId || stockItemId==='__new__' || !quantity || quantity<=0){ toast(stockItemId==='__new__' ? 'Please save the new item first, or select an existing one' : 'Please fill all required fields','error'); return; }
      const btn = document.getElementById('modal-submit');
      btn.disabled = true; btn.textContent = 'Saving...';
      try{
        await db.collection('stockTransactions').add({
          stockItemId, type, quantity,
          reference: document.getElementById('m-ref').value || null,
          notes: document.getElementById('m-notes').value || null,
          date: document.getElementById('m-date').value,
          depotId: state.currentDepotId,
          createdById: state.user.id,
          createdByName: state.user.name,
          createdAt: FieldValue.serverTimestamp(),
        });
        toast(`${type} of ${quantity} units recorded successfully`);
        closeModal();
        await refreshCurrentPage();
      } catch(err){ toast('Failed to record transaction: '+err.message,'error'); btn.disabled=false; btn.textContent='Save Movement'; }
    });
  });
  const fi = document.getElementById('filter-item'); if (fi) fi.addEventListener('change', e=>{ stockFilterItem=e.target.value; renderPageAfterFetch(); });
  const ft = document.getElementById('filter-type'); if (ft) ft.addEventListener('change', e=>{ stockFilterType=e.target.value; renderPageAfterFetch(); });
}

function bindModalClose(){
  const overlay = document.getElementById('modal-overlay');
  overlay.addEventListener('click', (e)=>{ if (e.target===overlay) closeModal(); });
  const cancel = document.getElementById('modal-cancel');
  if (cancel) cancel.addEventListener('click', closeModal);
}
function closeModal(){ document.getElementById('modal-root').innerHTML = ''; }

/* ================================ REPORTS ================================ */
function generateReportText(){
  const stockBalances = computeStockBalances();
  const maizeBalance = computeMaizeBalance();
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-ZA', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

  let text = `*SATELLITE DEPOT STOCK REPORT*\n`;
  text += `Date: ${dateStr}\n`;
  text += `${'═'.repeat(35)}\n\n`;

  text += `*MAIZE BALANCE*\n`;
  text += `  Purchased: ${fmtBags(maizeBalance.totalPurchasedKg)} bags (${fmtNum(maizeBalance.totalPurchasedKg)} kg)\n`;
  text += `  Dispatched: ${fmtBags(maizeBalance.totalDispatchedKg)} bags (${fmtNum(maizeBalance.totalDispatchedKg)} kg)\n`;
  text += `  Balance: ${fmtBags(maizeBalance.balanceKg)} bags (${fmtNum(maizeBalance.balanceKg)} kg)\n`;
  text += `  Total Cost: ZMW ${fmtNum(maizeBalance.totalPurchaseCost)}\n\n`;

  text += `*STOCK BALANCES (B/f + Receipts - Issues - Damages = Balance)*\n`;
  text += `${'─'.repeat(45)}\n`;
  for (const s of stockBalances){
    text += `  ${s.stockItemName}:\n`;
    text += `    Receipts: ${s.totalReceipts} | Issues: ${s.totalIssues} | Damages: ${s.totalDamages}\n`;
    text += `    *Balance: ${s.balance} ${s.unit}*\n`;
  }
  text += `\n`;

  text += `*RECENT STOCK TRANSACTIONS*\n`;
  for (const tx of state.stockTransactions.slice(0,10)){
    const sign = tx.type==='RECEIPT' ? '+' : '-';
    text += `  ${fmtDate(tx.date)} | ${tx.type} | ${sign}${tx.quantity} ${stockItemUnit(tx.stockItemId)} | ${stockItemName(tx.stockItemId)}\n`;
  }
  text += `\n`;

  if (state.maizePurchases.length>0){
    text += `*RECENT MAIZE PURCHASES*\n`;
    for (const p of state.maizePurchases.slice(0,5)){
      text += `  ${fmtDate(p.date)} | ${fmtBags(p.quantityKg)} bags (${fmtNum(p.quantityKg)}kg) @ ZMW${p.pricePerKg}/kg | ${p.supplier}\n`;
    }
    text += `\n`;
  }

  if (state.maizeDispatches.length>0){
    text += `*RECENT MAIZE DISPATCHES*\n`;
    for (const dp of state.maizeDispatches.slice(0,5)){
      text += `  ${fmtDate(dp.date)} | ${fmtBags(dp.quantityKg)} bags (${fmtNum(dp.quantityKg)}kg) to ${dp.destination}`;
      if (dp.idtIptNumber) text += ` | IDT/IPT: ${dp.idtIptNumber}`;
      text += `\n`;
    }
    text += `\n`;
  }

  text += `${'═'.repeat(35)}\n`;
  text += `Generated by Satellite Depot Management System\n`;
  return text;
}

      try{
        await db.collection('stockItems').add({
          name, unit, depotId: state.currentDepotId,
          createdById: state.user.id, createdByName: state.user.name,
          createdAt: FieldValue.serverTimestamp(),
        });
        toast(`Item "${name}" added`);
        closeModal();
        await refreshCurrentPage();
      } catch(err){ toast('Failed: '+err.message,'error'); btn.disabled=false; btn.textContent='Add Item'; }
    });
  });
  document.querySelectorAll('.edit-catalog-item-btn').forEach(el=>{
    el.addEventListener('click', ()=>{
      document.getElementById('modal-root').innerHTML = catalogItemModal({ id: el.dataset.id, name: el.dataset.name, unit: el.dataset.unit });
      bindModalClose();
      document.getElementById('catalog-item-form').addEventListener('submit', async (e)=>{
        e.preventDefault();
        const name = document.getElementById('ci-name').value.trim();
        const unit = document.getElementById('ci-unit').value.trim();
        if (!name || !unit){ toast('Please fill all required fields','error'); return; }
        const btn = document.getElementById('modal-submit'); btn.disabled=true; btn.textContent='Saving...';
        try{
          await db.collection('stockItems').doc(el.dataset.id).update({ name, unit });
          toast('Item updated');
          closeModal();
          await refreshCurrentPage();
        } catch(err){ toast('Failed: '+err.message,'error'); btn.disabled=false; btn.textContent='Save Changes'; }
      });
    });
  });
  document.querySelectorAll('.delete-catalog-item-btn').forEach(el=>{
    el.addEventListener('click', async ()=>{
      if (!confirm(`Remove "${el.dataset.name}" from the stock catalog? Existing transaction history for this item is kept.`)) return;
      try{
        await db.collection('stockItems').doc(el.dataset.id).update({ deleted: true, deletedAt: FieldValue.serverTimestamp() });
        toast('Item removed');
        await refreshCurrentPage();
      } catch(err){ toast('Failed: '+err.message,'error'); }
    });
  });
}

/* ------------------------------- Bootstrap ------------------------------- */
(async function init(){
  if (!LIBS_OK || window.__depotLibFailed) return;
  const saved = localStorage.getItem('depot-auth');
  if (saved){
    try{
      state.user = JSON.parse(saved);
      // Sign-in and the first depot fetch are two separate failure modes on
      // a flaky connection at startup. Only treat this as "not logged in"
      // if we can't even parse the saved session - a network hiccup on
      // either of these should fall back to cached data, not sign
      // someone out just because they opened the app without signal.
      try { await ensureAnonAuth(); } catch(e){ reportSyncError('sign-in (offline)', e); }
      try { await loadDepotsForUser(); } catch(e){ reportSyncError('depots (offline)', e); }
    } catch(e){ state.user = null; }
  } else {
    // No saved session - this is a brand-new visitor. Warm up an anonymous
    // auth session in the background (don't block first paint on it) so
    // that if they open the signup form, the live username-availability
    // check - which reads the `users` node and requires `auth != null` per
    // the RTDB rules - already has a valid token instead of silently
    // failing on every keystroke until the form is actually submitted.
    ensureAnonAuth().catch(()=>{}); // best-effort; offline visitors just won't get the live check until they're online, same as before
  }
  try{
    render();
  } catch(e){
    console.error('Render error:', e);
    document.getElementById('root').innerHTML = '<div style="padding:2rem;font-family:sans-serif;color:#991b1b;">Something went wrong while starting the app: ' + e.message + '</div>';
  }
})();
</script>
