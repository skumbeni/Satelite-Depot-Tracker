<style>
  :root{ --emerald:#047857; --emerald-dark:#065f46; }

  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}

  table.datatable td{padding:0.55rem 0.75rem;border-bottom:1px solid #f3f4f6;}
  table.datatable tr:hover td{background:#f9fafb;}
  .skeleton{background:linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 37%,#f3f4f6 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite;border-radius:0.5rem;}
  @keyframes shimmer{0%{background-position:100% 50%;}100%{background-position:0 50%;}}

  .nav-item{display:flex;align-items:center;gap:0.7rem;padding:0.55rem 0.75rem;border-radius:0.55rem;font-size:0.875rem;font-weight:500;color:#6b7280;cursor:pointer;}

<body class="bg-gray-50 text-gray-900">

<script>
/* =========================================================================
   SATELLITE DEPOT STOCK MANAGEMENT SYSTEM
   Single-file HTML + Firebase (Firestore) build
   Converted from a Next.js/Prisma reference project.

   ---------------------------------------------------------------------
   SETUP INSTRUCTIONS
   ---------------------------------------------------------------------
   1. Create a Firebase project at https://console.firebase.google.com
   2. Enable "Firestore Database" (production mode is fine).
   3. Enable "Authentication" -> Sign-in method -> Anonymous (this is used
      only to satisfy Firestore's request.auth != null security rule -
      actual login is username/password checked against the `users`
      collection below, matching the original app's login screen).
   4. Copy your web app config into FIREBASE_CONFIG below.
   5. Paste the FIRESTORE SECURITY RULES (bottom of this comment block)
      into Firestore -> Rules.
   6. Open this file in a browser (or host it on GitHub Pages). On first
      run, click "Seed Demo Data" on the login screen to create the demo
      users, stock items and personnel (same as the original seed route).

   Demo credentials after seeding:
     Manager  : manager / manager123
     SDC Clerk: sdc1 / sdc123
     SDC Clerk: sdc2 / sdc123

   ---------------------------------------------------------------------
   FIRESTORE SECURITY RULES (copy into Firebase Console -> Firestore -> Rules)
   ---------------------------------------------------------------------
   rules_version = '2';
   service cloud.firestore {
     match /databases/{database}/documents {
       match /{document=**} {
         allow read, write: if request.auth != null;
       }
     }
   }

   NOTE: Because login here is a simple username/password check against
   a Firestore collection (not Firebase Auth's real user system), these
   rules only require *some* signed-in (anonymous) session - they do not
   verify who is logged into the app itself. This mirrors the original
   app's simplicity (plaintext passwords, no server-side session) and is
   fine for an internal single-depot tool, but should not be treated as
   production-grade security for sensitive data.
   ========================================================================= */

const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

let auth, db, LIBS_OK = true;
try {
  if (typeof firebase === 'undefined' || typeof Chart === 'undefined') {
    throw new Error('One or more required libraries (Firebase / Chart.js / Tailwind) failed to load from the CDN.');
  }
  firebase.initializeApp(FIREBASE_CONFIG);
  auth = firebase.auth();
  db = firebase.firestore();
} catch (e) {
  LIBS_OK = false;
  console.error('Startup error:', e);
}

if (!LIBS_OK || window.__depotLibFailed) {
  document.addEventListener('DOMContentLoaded', showLibraryError);
  if (document.readyState !== 'loading') showLibraryError();
}

function showLibraryError(){
  document.getElementById('root').innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:#fffbeb;font-family:sans-serif;">
      <div style="max-width:32rem;background:#fff;border-radius:1rem;padding:2rem;box-shadow:0 4px 20px rgba(0,0,0,0.08);">
        <h1 style="font-size:1.25rem;font-weight:700;color:#92400e;margin-bottom:0.75rem;">Couldn't load required resources</h1>
        <p style="font-size:0.9rem;color:#374151;line-height:1.6;margin-bottom:0.75rem;">
          This app loads Tailwind CSS, Chart.js, and Firebase from public CDNs, and one or more of those failed to load.
        </p>
        <p style="font-size:0.9rem;color:#374151;line-height:1.6;margin-bottom:0.75rem;">This usually means one of the following:</p>
        <ul style="font-size:0.85rem;color:#4b5563;line-height:1.7;margin:0 0 1rem 1.25rem;">
          <li>You're viewing this inside an in-app file preview that blocks external network requests - try downloading the file and opening it directly in a browser (Chrome, Safari, etc.) instead.</li>
          <li>There's no internet connection right now.</li>
          <li>A firewall, ad-blocker, or corporate network is blocking cdn.tailwindcss.com, cdn.jsdelivr.net, or gstatic.com.</li>
        </ul>
        <p style="font-size:0.8rem;color:#9ca3af;">Reload the page once connected, or open the downloaded HTML file directly in your browser.</p>
      </div>
    </div>`;
}

/* ---------------------------- Global State ---------------------------- */
const state = {
  user: null,           // { id, username, name, role, phone }
  page: 'dashboard',
  sidebarOpen: false,
  stockItems: [],
  stockTransactions: [],
  maizePurchases: [],
  maizeDispatches: [],
  personnel: [],
  laborPayments: [],
  loading: false,
  charts: {},
};

const NAV_ITEMS = [
  { page: 'dashboard', label: 'Dashboard', icon: iconDashboard(), managerOnly: false },
  { page: 'stock-movement', label: 'Stock Movement', icon: iconSwap(), managerOnly: false },
  { page: 'maize-purchases', label: 'Maize Purchases', icon: iconCart(), managerOnly: false },
  { page: 'maize-dispatches', label: 'Maize Dispatches', icon: iconTruck(), managerOnly: false },
  { page: 'personnel', label: 'Personnel', icon: iconUsers(), managerOnly: true },
  { page: 'labor-payments', label: 'Labor Payments', icon: iconCash(), managerOnly: true },
  { page: 'reports', label: 'Reports & WhatsApp', icon: iconChart(), managerOnly: false },
];

/* ------------------------------ Utilities ------------------------------ */
function fmtNum(n){ return Number(n||0).toLocaleString(); }
function fmtDate(d){ return new Date(d).toLocaleDateString(); }
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function esc(s){ return (s===null||s===undefined)?'':String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toast(msg, type='success'){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3200);
}

/* -------------------------------- Icons -------------------------------- */
function svgIcon(path, extra=''){ return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 shrink-0" ${extra}>${path}</svg>`; }
function iconDashboard(){ return svgIcon('<rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>'); }
function iconSwap(){ return svgIcon('<path d="M17 3l4 4-4 4"/><path d="M3 7h18"/><path d="M7 21l-4-4 4-4"/><path d="M21 17H3"/>'); }

function iconUsers(){ return svgIcon('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'); }
function iconCash(){ return svgIcon('<rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/>'); }
function iconChart(){ return svgIcon('<path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>'); }
function iconPlus(){ return svgIcon('<path d="M12 5v14M5 12h14"/>'); }
function iconRefresh(){ return svgIcon('<path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>'); }
function iconWheat(){ return svgIcon('<path d="M12 22V2"/><path d="M17 8c0 2-2 3-5 3s-5-1-5-3 2-4 5-4 5 2 5 4z"/><path d="M17 14c0 2-2 3-5 3s-5-1-5-3 2-4 5-4 5 2 5 4z"/>', 'style="width:2rem;height:2rem;"'); }
function iconMenu(){ return svgIcon('<path d="M3 12h18M3 6h18M3 18h18"/>'); }
function iconX(){ return svgIcon('<path d="M18 6L6 18M6 6l12 12"/>'); }
function iconLogout(){ return svgIcon('<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/>'); }
function iconWhatsapp(){ return svgIcon('<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>'); }
function iconCopy(){ return svgIcon('<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>'); }

/* ----------------------------- Auth / Login ----------------------------- */
async function ensureAnonAuth(){
  if (!auth.currentUser) {
    await auth.signInAnonymously();
  }
}

async function login(username, password){
  const snap = await db.collection('users').where('username','==',username).limit(1).get();
  if (snap.empty) throw new Error('Invalid username or password');
  const doc = snap.docs[0];
  const u = doc.data();
  if (u.password !== password) throw new Error('Invalid username or password');
  await ensureAnonAuth();
  const user = { id: doc.id, username: u.username, name: u.name, role: u.role, phone: u.phone || null };
  state.user = user;
  localStorage.setItem('depot-auth', JSON.stringify(user));
  return user;
}

function logout(){
  state.user = null;
  localStorage.removeItem('depot-auth');
  render();
}

async function seedDemoData(){
  await ensureAnonAuth();
  const userCount = (await db.collection('users').limit(1).get()).size;
  if (userCount > 0) { toast('Demo data already exists'); return; }

  const batch = db.batch();
  const usersRef = db.collection('users');
  batch.set(usersRef.doc(), { username:'manager', password:'manager123', name:'Depot Manager', role:'MANAGER', phone:'+260XXXXXXXXX' });
  batch.set(usersRef.doc(), { username:'sdc1', password:'sdc123', name:'SDC Clerk 1', role:'SDC', phone:null });
  batch.set(usersRef.doc(), { username:'sdc2', password:'sdc123', name:'SDC Clerk 2', role:'SDC', phone:null });

  const stockItemsRef = db.collection('stockItems');
  [['Tents','pcs'],['Sprayers','pcs'],['Twine','rolls'],['Markers','pcs'],['Empty Grain Bags','pcs']].forEach(([name,unit])=>{
    batch.set(stockItemsRef.doc(), { name, unit });
  });

  const personnelRef = db.collection('personnel');
  batch.set(personnelRef.doc(), { name:'SDC Personnel 1', role:'SDC', rateOrSalary:5000, paymentType:'MONTHLY', phone:null, isActive:true });
  batch.set(personnelRef.doc(), { name:'SDC Personnel 2', role:'SDC', rateOrSalary:5000, paymentType:'MONTHLY', phone:null, isActive:true });
  batch.set(personnelRef.doc(), { name:'Guard 1', role:'GUARD', rateOrSalary:3000, paymentType:'MONTHLY', phone:null, isActive:true });
  batch.set(personnelRef.doc(), { name:'Guard 2', role:'GUARD', rateOrSalary:3000, paymentType:'MONTHLY', phone:null, isActive:true });

  await batch.commit();
  toast('Demo data seeded! Try manager / manager123');
}

/* ------------------------------ Data Fetch ------------------------------ */
async function fetchAllData(){
  state.loading = true;
  try{
    const [stockItemsSnap, stockTxSnap, purchasesSnap, dispatchesSnap, personnelSnap, paymentsSnap] = await Promise.all([
      db.collection('stockItems').orderBy('name').get(),
      db.collection('stockTransactions').orderBy('date','desc').get(),
      db.collection('maizePurchases').orderBy('date','desc').get(),
      db.collection('maizeDispatches').orderBy('date','desc').get(),
      db.collection('personnel').orderBy('name').get(),
      db.collection('laborPayments').orderBy('date','desc').get(),
    ]);
    state.stockItems = stockItemsSnap.docs.map(d=>({id:d.id, ...d.data()}));
    state.stockTransactions = stockTxSnap.docs.map(d=>({id:d.id, ...d.data()}));
    state.maizePurchases = purchasesSnap.docs.map(d=>({id:d.id, ...d.data()}));
    state.maizeDispatches = dispatchesSnap.docs.map(d=>({id:d.id, ...d.data()}));
    state.personnel = personnelSnap.docs.map(d=>({id:d.id, ...d.data()}));
    state.laborPayments = paymentsSnap.docs.map(d=>({id:d.id, ...d.data()}));
  } catch(e){
    console.error(e);
    toast('Failed to fetch data: ' + e.message, 'error');
  } finally {
    state.loading = false;
  }
}

/* ------------------------------ Computations ----------------------------- */
function computeStockBalances(){
  return state.stockItems.map(item=>{
    let balance=0, totalReceipts=0, totalIssues=0, totalDamages=0;
    state.stockTransactions.filter(tx=>tx.stockItemId===item.id).forEach(tx=>{
      if (tx.type==='RECEIPT'){ balance+=tx.quantity; totalReceipts+=tx.quantity; }
      else if (tx.type==='ISSUE'){ balance-=tx.quantity; totalIssues+=tx.quantity; }
      else if (tx.type==='DAMAGE'){ balance-=tx.quantity; totalDamages+=tx.quantity; }
    });
    return { stockItemId:item.id, stockItemName:item.name, unit:item.unit, balance, totalReceipts, totalIssues, totalDamages };
  });
}

function computeMaizeBalance(){
  const totalPurchasedKg = state.maizePurchases.reduce((s,p)=>s+p.quantityKg,0);
  const totalDispatchedKg = state.maizeDispatches.reduce((s,d)=>s+d.quantityKg,0);
  const totalPurchaseCost = state.maizePurchases.reduce((s,p)=>s+p.totalCost,0);
  return { totalPurchasedKg, totalDispatchedKg, balanceKg: totalPurchasedKg-totalDispatchedKg, totalPurchaseCost };
}

function laborPaymentsThisMonth(){
  const now = new Date();
  return state.laborPayments.filter(p=>{
    const d = new Date(p.date);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  }).reduce((s,p)=>s+p.amount,0);
}

function personnelName(id){ const p = state.personnel.find(x=>x.id===id); return p ? p.name : 'Unknown'; }
function personnelById(id){ return state.personnel.find(x=>x.id===id); }
function stockItemName(id){ const s = state.stockItems.find(x=>x.id===id); return s ? s.name : 'Unknown'; }
function stockItemUnit(id){ const s = state.stockItems.find(x=>x.id===id); return s ? s.unit : ''; }

/* -------------------------------- Render -------------------------------- */
function render(){
  const root = document.getElementById('root');
  if (!state.user){
    root.innerHTML = renderLogin();
    attachLoginEvents();
    return;
  }
  root.innerHTML = renderApp();
  attachAppEvents();
  renderPageContent();
}

function renderLogin(){
  return `
  <div class="min-h-screen flex items-center justify-center p-4" style="background:linear-gradient(135deg,#fffbeb,#ffffff,#ecfdf5);">
    <div class="card w-full max-w-md p-8">
      <div class="text-center mb-2">
        <div class="mx-auto w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center mb-4 text-emerald-700">${iconWheat()}</div>
        <h1 class="text-2xl font-bold text-emerald-900">Satellite Depot</h1>
        <p class="text-sm text-gray-500 mt-1">Stock Management System</p>
      </div>
      <form id="login-form" class="space-y-4 mt-6">
        <div>
          <label class="label">Username</label>
          <input class="input" id="login-username" placeholder="Enter your username" required autocomplete="username">
        </div>
        <div>
          <label class="label">Password</label>
          <input class="input" id="login-password" type="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary w-full py-2.5">Sign In</button><p class="text-xs text-amber-700 mt-2">If login does not open the dashboard, first replace the placeholder Firebase config in the file with your real project keys.</p>
      </form>
      <div class="mt-6 p-3 bg-gray-50 rounded-lg text-xs text-gray-500 space-y-1">
        <p class="font-semibold text-gray-700">Demo Credentials:</p>
        <p>Manager: <span class="font-mono">manager / manager123</span></p>
        <p>SDC Clerk: <span class="font-mono">sdc1 / sdc123</span></p>
        <button id="seed-btn" class="btn btn-outline w-full mt-2 text-xs py-1.5">Seed Demo Data (first run only)</button>
      </div>
    </div>
  </div>`;
}

function attachLoginEvents(){
  document.getElementById('login-form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    btn.disabled = true; btn.textContent = 'Signing in...';
    try{
      const user = await login(username, password);
      toast(`Welcome, ${user.name}!`);
      await fetchAllData();
      render();
    } catch(err){
      toast(err.message || 'Login failed', 'error');
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  });
  document.getElementById('seed-btn').addEventListener('click', async ()=>{
    const btn = document.getElementById('seed-btn');
    btn.disabled = true; btn.textContent = 'Seeding...';
    try{ await seedDemoData(); } catch(err){ toast(err.message,'error'); }
    btn.disabled = false; btn.textContent = 'Seed Demo Data (first run only)';
  });
}

function renderApp(){
  const items = NAV_ITEMS.filter(i => !i.managerOnly || state.user.role === 'MANAGER');
  const initials = state.user.name.split(' ').map(n=>n[0]).join('').slice(0,2);
  return `
  ${state.sidebarOpen ? `<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-40 lg:hidden"></div>` : ''}
  <aside id="sidebar" class="fixed top-0 left-0 z-50 h-full w-64 bg-white border-r flex flex-col ${state.sidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0">
    <div class="flex items-center gap-3 px-4 py-4 border-b">
      <div class="w-9 h-9 bg-emerald-100 rounded-lg flex items-center justify-center shrink-0 text-emerald-700">${iconWheat()}</div>
      <div class="flex-1 min-w-0">
        <h1 class="text-sm font-bold text-emerald-900 truncate">Satellite Depot</h1>
        <p class="text-xs text-gray-500">Stock Management</p>
      </div>
      <button id="sidebar-close" class="lg:hidden text-gray-500">${iconX()}</button>
    </div>
    <nav class="flex-1 overflow-y-auto py-3 px-3 space-y-1">
      ${items.map(i => `<div class="nav-item ${state.page===i.page?'active':''}" data-page="${i.page}">${i.icon}${i.label}</div>`).join('')}

function attachAppEvents(){
  document.querySelectorAll('.nav-item[data-page]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.page = el.dataset.page;
      state.sidebarOpen = false;
      render();
    });
  });
  document.getElementById('logout-btn').addEventListener('click', logout);
  const openBtn = document.getElementById('sidebar-open');
  if (openBtn) openBtn.addEventListener('click', ()=>{ state.sidebarOpen = true; render(); });
  const closeBtn = document.getElementById('sidebar-close');
  if (closeBtn) closeBtn.addEventListener('click', ()=>{ state.sidebarOpen = false; render(); });
  const overlay = document.getElementById('sidebar-overlay');
  if (overlay) overlay.addEventListener('click', ()=>{ state.sidebarOpen = false; render(); });
}

async function renderPageContent(){
  const el = document.getElementById('page-content');
  el.innerHTML = `<div class="space-y-4">${Array.from({length:4}).map(()=>'<div class="skeleton h-28"></div>').join('')}</div>`;
  await fetchAllData();
  const el2 = document.getElementById('page-content');
  if (!el2) return; // page may have changed while awaiting
  switch(state.page){
    case 'dashboard': el2.innerHTML = renderDashboard(); attachDashboardEvents(); break;
    case 'stock-movement': el2.innerHTML = renderStockMovement(); attachStockMovementEvents(); break;
    case 'maize-purchases': el2.innerHTML = renderMaizePurchases(); attachMaizePurchasesEvents(); break;
    case 'maize-dispatches': el2.innerHTML = renderMaizeDispatches(); attachMaizeDispatchesEvents(); break;
    case 'personnel': el2.innerHTML = renderPersonnel(); attachPersonnelEvents(); break;
    case 'labor-payments': el2.innerHTML = renderLaborPayments(); attachLaborPaymentsEvents(); break;
    case 'reports': el2.innerHTML = renderReports(); attachReportsEvents(); break;
    default: el2.innerHTML = renderDashboard(); attachDashboardEvents();
  }
}

async function refreshCurrentPage(){
  await fetchAllData();
  renderPageAfterFetch();
}
function renderPageAfterFetch(){
  const el = document.getElementById('page-content');
  if (!el) return;
  switch(state.page){
    case 'dashboard': el.innerHTML = renderDashboard(); attachDashboardEvents(); break;
    case 'stock-movement': el.innerHTML = renderStockMovement(); attachStockMovementEvents(); break;
    case 'maize-purchases': el.innerHTML = renderMaizePurchases(); attachMaizePurchasesEvents(); break;
    case 'maize-dispatches': el.innerHTML = renderMaizeDispatches(); attachMaizeDispatchesEvents(); break;
    case 'personnel': el.innerHTML = renderPersonnel(); attachPersonnelEvents(); break;
    case 'labor-payments': el.innerHTML = renderLaborPayments(); attachLaborPaymentsEvents(); break;
    case 'reports': el.innerHTML = renderReports(); attachReportsEvents(); break;
  }
}

function attachDashboardEvents(){
  const stockBalances = computeStockBalances();
  if (state.charts.balances) state.charts.balances.destroy();
  if (state.charts.movement) state.charts.movement.destroy();

  const ctx1 = document.getElementById('chart-balances');
  if (ctx1){
    state.charts.balances = new Chart(ctx1, {
      type: 'bar',
      data: {
        labels: stockBalances.map(s=>s.stockItemName),
        datasets: [{ label:'Balance', data: stockBalances.map(s=>s.balance), backgroundColor:'#16a34a', borderRadius:4 }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ ticks:{ font:{size:11} } }, y:{ beginAtZero:true } } }
    });
  }

  const totalReceipts = stockBalances.reduce((s,b)=>s+b.totalReceipts,0);
  const totalIssues = stockBalances.reduce((s,b)=>s+b.totalIssues,0);
  const totalDamages = stockBalances.reduce((s,b)=>s+b.totalDamages,0);
  const ctx2 = document.getElementById('chart-movement');
  if (ctx2){
    const labels=[], data=[], colors=[];
    if (totalReceipts>0){ labels.push('Receipts'); data.push(totalReceipts); colors.push('#16a34a'); }
    if (totalIssues>0){ labels.push('Issues'); data.push(totalIssues); colors.push('#dc2626'); }
    if (totalDamages>0){ labels.push('Damages'); data.push(totalDamages); colors.push('#f59e0b'); }
    state.charts.movement = new Chart(ctx2, {
      type: 'doughnut',
      data: { labels, datasets:[{ data, backgroundColor: colors }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}} }
    });
  }
}

function attachStockMovementEvents(){
  document.getElementById('refresh-btn').addEventListener('click', refreshCurrentPage);
  const addBtn = document.getElementById('add-stock-item-btn');
  if (addBtn) addBtn.addEventListener('click', ()=>{
    document.getElementById('modal-root').innerHTML = addStockItemModal();
    bindModalClose();
    document.getElementById('stock-item-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const name = document.getElementById('si-name').value.trim();
      const unit = document.getElementById('si-unit').value.trim();
      if (!name || !unit){ toast('Please fill all required fields','error'); return; }
      const btn = document.getElementById('modal-submit'); btn.disabled=true; btn.textContent='Saving...';
      try{
        await db.collection('stockItems').add({ name, unit });
        toast(`Stock item "${name}" added successfully`);
        closeModal();
        await refreshCurrentPage();
      } catch(err){ toast('Failed to add item: '+err.message,'error'); btn.disabled=false; btn.textContent='Save Item'; }
    });
  });

  document.getElementById('new-movement-btn').addEventListener('click', ()=>{
    document.getElementById('modal-root').innerHTML = stockMovementModal();
    bindModalClose();
    document.getElementById('movement-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const stockItemId = document.getElementById('m-item').value;
      const type = document.getElementById('m-type').value;
      const quantity = Number(document.getElementById('m-qty').value);
      if (!stockItemId || !quantity || quantity<=0){ toast('Please fill all required fields','error'); return; }
      const btn = document.getElementById('modal-submit');
      btn.disabled = true; btn.textContent = 'Saving...';
      try{
        await db.collection('stockTransactions').add({
          stockItemId, type, quantity,
          reference: document.getElementById('m-ref').value || null,
          notes: document.getElementById('m-notes').value || null,
          date: document.getElementById('m-date').value,
          createdById: state.user.id,
          createdByName: state.user.name,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        toast(`${type} of ${quantity} units recorded successfully`);
        closeModal();
        await refreshCurrentPage();
      } catch(err){ toast('Failed to record transaction: '+err.message,'error'); btn.disabled=false; btn.textContent='Save Movement'; }
    });
  });
  const fi = document.getElementById('filter-item'); if (fi) fi.addEventListener('change', e=>{ stockFilterItem=e.target.value; renderPageAfterFetch(); });
  const ft = document.getElementById('filter-type'); if (ft) ft.addEventListener('change', e=>{ stockFilterType=e.target.value; renderPageAfterFetch(); });
}

function bindModalClose(){
  const overlay = document.getElementById('modal-overlay');
  overlay.addEventListener('click', (e)=>{ if (e.target===overlay) closeModal(); });
  const cancel = document.getElementById('modal-cancel');
  if (cancel) cancel.addEventListener('click', closeModal);
}
function closeModal(){ document.getElementById('modal-root').innerHTML = ''; }

function attachLaborPaymentsEvents(){
  document.getElementById('refresh-btn').addEventListener('click', refreshCurrentPage);
  document.getElementById('new-payment-btn').addEventListener('click', ()=>{
    document.getElementById('modal-root').innerHTML = laborPaymentModal();
    bindModalClose();
    const personnelSelect = document.getElementById('lp-personnel');
    const bagRow = document.getElementById('lp-bag-row');
    const bagsInput = document.getElementById('lp-bags');
    const autocalc = document.getElementById('lp-autocalc');
    const amountInput = document.getElementById('lp-amount');
    const updateBagCalc = ()=>{
      const opt = personnelSelect.selectedOptions[0];
      const isPerBag = opt && opt.dataset.paymentType === 'PER_BAG';
      bagRow.classList.toggle('hidden', !isPerBag);
      if (isPerBag){
        const rate = Number(opt.dataset.rate)||0;
        const amount = (Number(bagsInput.value)||0) * rate;
        autocalc.textContent = amount.toLocaleString() + ' ZMW';
        amountInput.value = amount || '';
      } else {
        autocalc.textContent = '0 ZMW';
      }
    };
    personnelSelect.addEventListener('change', updateBagCalc);
    bagsInput.addEventListener('input', updateBagCalc);
    document.getElementById('payment-form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const personnelId = personnelSelect.value;
      const amount = Number(document.getElementById('lp-amount').value);
      if (!personnelId || !amount || amount<=0){ toast('Please fill all required fields','error'); return; }
      const btn = document.getElementById('modal-submit'); btn.disabled=true; btn.textContent='Saving...';
      try{
        await db.collection('laborPayments').add({
          personnelId,
          date: document.getElementById('lp-date').value,
          bagsHandled: bagsInput.value ? Number(bagsInput.value) : null,
          rateApplied: personnelById(personnelId)?.rateOrSalary || null,
          amount,
          period: document.getElementById('lp-period').value || null,
          notes: document.getElementById('lp-notes').value || null,
          createdById: state.user.id, createdByName: state.user.name,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        toast(`Payment of ZMW ${amount} recorded`);
        closeModal();
        await refreshCurrentPage();
      } catch(err){ toast('Failed: '+err.message,'error'); btn.disabled=false; btn.textContent='Save Payment'; }
    });
  });
}

/* ================================ REPORTS ================================ */
function generateReportText(){
  const stockBalances = computeStockBalances();
  const maizeBalance = computeMaizeBalance();
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-ZA', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

  let text = `*SATELLITE DEPOT STOCK REPORT*\n`;
  text += `Date: ${dateStr}\n`;
  text += `${'═'.repeat(35)}\n\n`;

  text += `*MAIZE BALANCE*\n`;
  text += `  Purchased: ${fmtNum(maizeBalance.totalPurchasedKg)} kg\n`;
  text += `  Dispatched: ${fmtNum(maizeBalance.totalDispatchedKg)} kg\n`;
  text += `  Balance: ${fmtNum(maizeBalance.balanceKg)} kg\n`;
  text += `  Total Cost: ZMW ${fmtNum(maizeBalance.totalPurchaseCost)}\n\n`;

  text += `*STOCK BALANCES (B/f + Receipts - Issues - Damages = Balance)*\n`;
  text += `${'─'.repeat(45)}\n`;
  for (const s of stockBalances){
    text += `  ${s.stockItemName}:\n`;
    text += `    Receipts: ${s.totalReceipts} | Issues: ${s.totalIssues} | Damages: ${s.totalDamages}\n`;
    text += `    *Balance: ${s.balance} ${s.unit}*\n`;
  }
  text += `\n`;

  text += `*RECENT STOCK TRANSACTIONS*\n`;
  for (const tx of state.stockTransactions.slice(0,10)){
    const sign = tx.type==='RECEIPT' ? '+' : '-';
    text += `  ${fmtDate(tx.date)} | ${tx.type} | ${sign}${tx.quantity} ${stockItemUnit(tx.stockItemId)} | ${stockItemName(tx.stockItemId)}\n`;
  }
  text += `\n`;

  if (state.maizePurchases.length>0){
    text += `*RECENT MAIZE PURCHASES*\n`;
    for (const p of state.maizePurchases.slice(0,5)){
      text += `  ${fmtDate(p.date)} | ${fmtNum(p.quantityKg)}kg @ ZMW${p.pricePerKg}/kg | ${p.supplier}\n`;
    }
    text += `\n`;
  }

  if (state.maizeDispatches.length>0){
    text += `*RECENT MAIZE DISPATCHES*\n`;
    for (const dp of state.maizeDispatches.slice(0,5)){
      text += `  ${fmtDate(dp.date)} | ${fmtNum(dp.quantityKg)}kg to ${dp.destination}`;
      if (dp.waybillNumber) text += ` | WB: ${dp.waybillNumber}`;
      text += `\n`;
    }
    text += `\n`;
  }

  text += `${'═'.repeat(35)}\n`;
  text += `Generated by Satellite Depot Management System\n`;
  return text;
}

function renderReports(){
  const phone = state.user.phone || '+260XXXXXXXXX';
  return `
  <div class="space-y-6">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div><h2 class="text-2xl font-bold">Reports & WhatsApp</h2><p class="text-sm text-gray-500">Generate stock report and send to the manager via WhatsApp</p></div>
      <button id="refresh-btn" class="btn btn-outline">${iconRefresh()} Refresh Data</button>
    </div>
    <div class="card p-4">
      <h3 class="text-base font-semibold mb-1 flex items-center gap-2">Send Report</h3>
      <p class="text-sm text-gray-500 mb-3">Generate the report and send it via WhatsApp or copy to clipboard</p>
      <div class="flex flex-col sm:flex-row gap-3">
        <div class="flex-1">
          <label class="label">Manager's Phone Number</label>
          <input class="input" id="report-phone" value="${esc(phone)}" placeholder="+260XXXXXXXXX">
        </div>
        <div class="flex items-end gap-2">
          <button id="send-whatsapp-btn" class="btn" style="background:#16a34a;color:#fff;">${iconWhatsapp()} Send via WhatsApp</button>
          <button id="copy-report-btn" class="btn btn-outline">${iconCopy()} Copy</button>
        </div>
      </div>
    </div>
    <div class="card p-4">
      <h3 class="text-base font-semibold mb-3">Report Preview</h3>
      <div class="bg-gray-50 rounded-lg p-4 font-mono text-xs leading-relaxed whitespace-pre-wrap max-h-[500px] overflow-y-auto" id="report-preview"></div>
    </div>
  </div>`;
}

function attachReportsEvents(){
  document.getElementById('refresh-btn').addEventListener('click', refreshCurrentPage);
  document.getElementById('report-preview').textContent = generateReportText();
  document.getElementById('send-whatsapp-btn').addEventListener('click', ()=>{
    const phone = document.getElementById('report-phone').value.trim();
    if (!phone){ toast('Please enter a phone number','error'); return; }
    const cleanPhone = phone.replace(/[^0-9+]/g,'').replace('+','');
    const encodedText = encodeURIComponent(generateReportText());
    window.open(`https://wa.me/${cleanPhone}?text=${encodedText}`, '_blank');
    toast('WhatsApp opened with report. Send the message to complete.');
  });
  document.getElementById('copy-report-btn').addEventListener('click', async ()=>{
    try{
      await navigator.clipboard.writeText(generateReportText());
      toast('Report copied to clipboard');
    } catch(err){ toast('Failed to copy','error'); }
  });
}

/* ------------------------------- Bootstrap ------------------------------- */
(async function init(){
  if (!LIBS_OK || window.__depotLibFailed) return;
  const saved = localStorage.getItem('depot-auth');
  if (saved){
    try{ state.user = JSON.parse(saved); await ensureAnonAuth(); } catch(e){ state.user = null; }
  }
  try{
    render();
  } catch(e){
    console.error('Render error:', e);
    document.getElementById('root').innerHTML = '<div style="padding:2rem;font-family:sans-serif;color:#991b1b;">Something went wrong while starting the app: ' + e.message + '</div>';
  }
})();
</script>
</body>
</html>
